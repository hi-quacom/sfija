<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#FAF7F2; --surface:#FFFFFF; --surface-2:#F4EFE7;
  --ink:#1C1B19; --ink-soft:#5B554C; --ink-faint:#8B8276;
  --line:#E7E1D8; --line-strong:#D8CFC1;
  --kraft:#B07D4F; --kraft-soft:#EADfce; --kraft-ink:#7A5226;
  --ok:#2E7D55; --ok-bg:#E5F1EA;
  --warn:#B5731A; --warn-bg:#FBF0DD;
  --bad:#B23B30; --bad-bg:#FBE7E4;
  --info:#36618E; --info-bg:#E6EEF6;
  --r:14px; --r-sm:10px;
  --sh:0 1px 2px rgba(28,27,25,.04),0 2px 8px rgba(28,27,25,.05);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--ink);font-family:Inter,system-ui,sans-serif;-webkit-font-smoothing:antialiased;font-size:15px;line-height:1.45}
button,input,select,textarea{font-family:inherit;font-size:inherit;color:inherit}
button{cursor:pointer;border:none;background:none}
a{color:var(--kraft-ink)}
.app{display:flex;min-height:100vh}

/* ---- Sidebar (desktop) ---- */
.side{width:228px;background:var(--ink);color:#EDE7DC;flex-shrink:0;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;padding:18px 12px;gap:2px}
.brand{display:flex;align-items:center;gap:10px;padding:6px 8px 16px}
.brand .logo{width:38px;height:38px;border-radius:10px;background:var(--kraft);display:grid;place-items:center;font-weight:800;color:#1C1B19;font-size:18px}
.brand b{font-size:18px;font-weight:800;letter-spacing:.3px}
.brand span{font-size:11px;color:#A79E8F;display:block;font-weight:500}
.nav{display:flex;flex-direction:column;gap:1px;overflow:auto}
.nav button{display:flex;align-items:center;gap:11px;width:100%;text-align:left;padding:9px 11px;border-radius:9px;color:#CFC7B8;font-weight:500;font-size:14px}
.nav button .ic{width:18px;text-align:center;font-size:15px;opacity:.85}
.nav button:hover{background:#2A2824;color:#fff}
.nav button.on{background:var(--kraft);color:#1C1B19;font-weight:600}
.nav .badge{margin-left:auto;background:var(--bad);color:#fff;font-size:10px;font-weight:700;padding:1px 7px;border-radius:20px}
.nav button.on .badge{background:#1C1B19;color:#fff}
.side-foot{margin-top:auto;font-size:11px;color:#8B8276;padding:10px 8px;border-top:1px solid #34312B}

/* ---- Main ---- */
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{display:none}
.content{padding:26px 30px 90px;max-width:1180px;width:100%;margin:0 auto}
.page-h{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.page-h h1{font-size:24px;font-weight:800;letter-spacing:-.4px}
.page-h p{color:var(--ink-soft);font-size:13.5px;margin-top:3px}

/* ---- Cards / KPIs ---- */
.grid{display:grid;gap:14px}
.kpis{grid-template-columns:repeat(auto-fill,minmax(190px,1fr))}
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:15px 16px;box-shadow:var(--sh)}
.kpi .l{font-size:11.5px;color:var(--ink-faint);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.kpi .v{font-size:24px;font-weight:800;margin-top:5px;letter-spacing:-.5px}
.kpi .s{font-size:12px;color:var(--ink-soft);margin-top:3px}
.kpi.hero{background:var(--ink);color:#F4EFE7;border-color:var(--ink)}
.kpi.hero .l{color:#B8AF9F}.kpi.hero .v{color:#fff}.kpi.hero .s{color:#C9C0B1}
.kpi.kraft{background:var(--kraft-soft);border-color:#E0D2BC}.kpi.kraft .v{color:var(--kraft-ink)}

.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);margin-bottom:18px;overflow:hidden}
.card-h{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 18px;border-bottom:1px solid var(--line);flex-wrap:wrap}
.card-h h2{font-size:16px;font-weight:700}
.card-h .sub{font-size:12.5px;color:var(--ink-soft);font-weight:400;margin-top:2px}
.card-b{padding:16px 18px}
.card-b.flush{padding:0}

/* ---- Tables ---- */
.tbl{width:100%;border-collapse:collapse;font-size:14px}
.tbl th{text-align:left;font-size:11px;font-weight:700;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.4px;padding:10px 14px;border-bottom:1px solid var(--line);background:var(--surface-2);white-space:nowrap}
.tbl td{padding:9px 14px;border-bottom:1px solid var(--line);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:#FBF9F5}
.tbl .num{text-align:right;font-variant-numeric:tabular-nums}
.tbl input,.tbl select{width:100%;border:1px solid transparent;background:transparent;padding:5px 7px;border-radius:7px}
.tbl input:hover,.tbl select:hover{border-color:var(--line)}
.tbl input:focus,.tbl select:focus{outline:none;border-color:var(--kraft);background:#fff}
.tbl input.num{text-align:right}
.tbl td.calc{font-variant-numeric:tabular-nums;text-align:right;color:var(--ink-soft);font-weight:600}
.tbl .row-x{color:var(--ink-faint);font-size:16px;padding:2px 6px;border-radius:6px}
.tbl .row-x:hover{background:var(--bad-bg);color:var(--bad)}
.tbl tfoot td{font-weight:700;background:var(--surface-2);border-top:2px solid var(--line-strong)}
.scroll-x{overflow-x:auto}

/* ---- Controls ---- */
.btn{display:inline-flex;align-items:center;gap:7px;padding:8px 14px;border-radius:9px;font-weight:600;font-size:13.5px;border:1px solid var(--line-strong);background:var(--surface);color:var(--ink);transition:.12s}
.btn:hover{background:var(--surface-2)}
.btn.pri{background:var(--ink);color:#fff;border-color:var(--ink)}
.btn.pri:hover{background:#34312B}
.btn.kr{background:var(--kraft);color:#1C1B19;border-color:var(--kraft)}
.btn.kr:hover{filter:brightness(1.05)}
.btn.sm{padding:6px 11px;font-size:12.5px}
.btn.gh{background:transparent;border-color:transparent;color:var(--kraft-ink)}
.btn.gh:hover{background:var(--kraft-soft)}
.btn.dgr{color:var(--bad);border-color:var(--bad-bg)}
.btn.dgr:hover{background:var(--bad-bg)}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:12px;font-weight:600;color:var(--ink-soft)}
.inp{border:1px solid var(--line-strong);background:#fff;padding:9px 11px;border-radius:9px;width:100%}
.inp:focus{outline:none;border-color:var(--kraft);box-shadow:0 0 0 3px var(--kraft-soft)}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px}

.pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}
.pill.ok{background:var(--ok-bg);color:var(--ok)}
.pill.warn{background:var(--warn-bg);color:var(--warn)}
.pill.bad{background:var(--bad-bg);color:var(--bad)}
.pill.info{background:var(--info-bg);color:var(--info)}
.pill.mut{background:var(--surface-2);color:var(--ink-soft)}

/* ---- Alerts ---- */
.alert{display:flex;gap:12px;align-items:flex-start;padding:13px 16px;border-radius:var(--r-sm);border:1px solid;margin-bottom:10px}
.alert .ai{font-size:18px;line-height:1.2}
.alert b{display:block;font-size:14px}
.alert p{font-size:13px;margin-top:1px}
.alert.bad{background:var(--bad-bg);border-color:#F0C9C3;color:#7A2820}
.alert.warn{background:var(--warn-bg);border-color:#EAD3A6;color:#7A5212}
.alert.info{background:var(--info-bg);border-color:#C7D8EA;color:#284B6B}
.alert.ok{background:var(--ok-bg);border-color:#BFE0CD;color:#1F5C3D}

.empty{text-align:center;padding:34px 16px;color:var(--ink-faint)}
.empty .e-ic{font-size:34px;opacity:.5}
.empty p{margin-top:8px;font-size:13.5px}

.row-actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.hint{font-size:12.5px;color:var(--ink-soft);background:var(--surface-2);border-left:3px solid var(--kraft);padding:10px 13px;border-radius:0 8px 8px 0;margin:0 0 14px}
.split{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.tag-line{display:flex;gap:8px;flex-wrap:wrap;align-items:center;font-size:12.5px;color:var(--ink-soft)}
.toggle{position:relative;display:inline-block;width:38px;height:22px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle .sl{position:absolute;inset:0;background:var(--line-strong);border-radius:20px;transition:.15s}
.toggle .sl:before{content:"";position:absolute;height:16px;width:16px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.15s}
.toggle input:checked+.sl{background:var(--ok)}
.toggle input:checked+.sl:before{transform:translateX(16px)}

/* ---- Modal ---- */
.ov{position:fixed;inset:0;background:rgba(28,27,25,.42);display:none;align-items:center;justify-content:center;z-index:50;padding:16px;backdrop-filter:blur(2px)}
.ov.on{display:flex}
.modal{background:var(--surface);border-radius:16px;width:100%;max-width:540px;max-height:90vh;overflow:auto;box-shadow:0 12px 40px rgba(0,0,0,.25)}
.modal-h{display:flex;justify-content:space-between;align-items:center;padding:18px 20px;border-bottom:1px solid var(--line)}
.modal-h h3{font-size:17px;font-weight:700}
.modal-b{padding:20px}
.modal-f{padding:14px 20px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end;background:var(--surface-2)}

/* ---- Toast ---- */
.toast-wrap{position:fixed;bottom:18px;right:18px;z-index:80;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--ink);color:#fff;padding:11px 16px;border-radius:10px;font-size:13.5px;font-weight:500;box-shadow:0 6px 20px rgba(0,0,0,.25);animation:tin .2s}
@keyframes tin{from{opacity:0;transform:translateY(8px)}}

/* ---- Mobile ---- */
.botnav{display:none}
@media(max-width:860px){
  .side{display:none}
  .content{padding:16px 14px 96px}
  .page-h h1{font-size:21px}
  .split{grid-template-columns:1fr}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--ink);color:#fff;position:sticky;top:0;z-index:30}
  .topbar b{font-weight:800;display:flex;align-items:center;gap:8px}
  .topbar .logo{width:30px;height:30px;border-radius:8px;background:var(--kraft);display:grid;place-items:center;color:#1C1B19;font-weight:800}
  .botnav{display:grid;grid-template-columns:repeat(5,1fr);position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--line);z-index:40;padding-bottom:env(safe-area-inset-bottom)}
  .botnav button{padding:8px 2px 7px;display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--ink-faint);font-size:10px;font-weight:600;position:relative}
  .botnav button .ic{font-size:18px}
  .botnav button.on{color:var(--kraft-ink)}
  .botnav .badge{position:absolute;top:4px;right:18%;background:var(--bad);color:#fff;font-size:9px;font-weight:700;min-width:15px;height:15px;border-radius:10px;display:grid;place-items:center}
  .kpi .v{font-size:21px}
  .form-grid{grid-template-columns:1fr 1fr}
  .modal-b{padding:16px}
}
@media(max-width:480px){.kpis{grid-template-columns:1fr 1fr}.form-grid{grid-template-columns:1fr}}
.mono{font-variant-numeric:tabular-nums}
.neg{color:var(--bad)}.pos{color:var(--ok)}
/* ---- marca / logo ---- */
.brand .logoimg{height:26px;width:auto;display:block}
.topbar .logoimg{height:22px;width:auto;display:block}
/* ---- login ---- */
.login-wrap{position:fixed;inset:0;z-index:200;background:var(--bg);display:none;align-items:center;justify-content:center;padding:24px}
.login-wrap.on{display:flex}
.login-card{width:100%;max-width:360px;background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:32px 26px;box-shadow:0 18px 50px rgba(28,27,25,.10)}
.login-card .logoimg{height:42px;margin:0 auto 6px;display:block}
.login-card .sub{text-align:center;color:var(--ink-faint);font-size:13px;margin-bottom:22px}
.login-card label{font-size:12px;font-weight:600;color:var(--ink-soft);display:block;margin:0 0 5px 2px}
.login-card .inp{width:100%;margin-bottom:14px}
.login-card .btn{width:100%;justify-content:center;padding:11px}
.login-err{background:#FBE9E7;color:#B23B2E;border:1px solid #F3C9C2;border-radius:9px;padding:9px 12px;font-size:13px;margin-bottom:14px;display:none}
.login-err.on{display:block}
.login-foot{text-align:center;font-size:11.5px;color:var(--ink-faint);margin-top:18px}
/* ---- presence ---- */
.presence{display:flex;align-items:center;gap:6px;padding:4px 8px 10px;flex-wrap:wrap}
.av{width:26px;height:26px;border-radius:50%;display:grid;place-items:center;font-size:11px;font-weight:700;color:#fff;border:2px solid var(--ink);position:relative}
.av.me{border-color:var(--kraft)}
.av .dot{position:absolute;right:-1px;bottom:-1px;width:8px;height:8px;border-radius:50%;background:#3BB273;border:1.5px solid var(--ink)}
.presence .who{font-size:11px;color:#A79E8F;line-height:1.2}
.side-foot .logout{margin-top:8px;color:#8B8276;font-size:11.5px;text-decoration:underline;cursor:pointer;background:none;border:none;padding:0}
/* sync pill */
.syncpill{position:fixed;bottom:16px;right:16px;z-index:120;background:var(--ink);color:#F4EFE7;font-size:12px;font-weight:600;padding:7px 13px;border-radius:20px;box-shadow:0 6px 18px rgba(0,0,0,.18);opacity:0;transform:translateY(8px);transition:.18s;pointer-events:none}
.syncpill.on{opacity:1;transform:translateY(0)}
.syncpill.off{background:#B23B2E}
@media(max-width:860px){.syncpill{bottom:78px}}
/* presence chips on mobile topbar */
.topbar .pres-mini{display:flex;gap:4px;align-items:center}
.topbar .pres-mini .av{width:22px;height:22px;border:2px solid #fff;font-size:10px}
.modo-sw{display:flex;gap:4px;background:rgba(255,255,255,.06);border-radius:9px;padding:3px;margin-bottom:10px}
.modo-sw button{flex:1;border:none;background:none;color:#A79E8F;font-size:11.5px;font-weight:700;padding:6px 4px;border-radius:7px;cursor:pointer}
.modo-sw button.on{background:var(--kraft);color:#1C1B19}
.tbl tr.rowbad td{background:var(--bad-bg)}
</style>
</head>

<script>
// ============================ MODAL / FORM / TOAST ============================
function openModal(title,body,foot){
  $("modal").innerHTML=`<div class="modal-h"><h3>${esc(title)}</h3><button class="row-x" style="font-size:22px" onclick="closeModal()">×</button></div><div class="modal-b">${body}</div>${foot!==undefined&&foot!==""?`<div class="modal-f">${foot}</div>`:""}`;
  $("ov").classList.add("on");
}
function closeModal(){$("ov").classList.remove("on");}
function bindOverlay(){$("ov").addEventListener("click",e=>{if(e.target.id==="ov")closeModal();});}
function confirmBox(title,msg,onYes){
  openModal(title,`<p style="color:var(--ink-soft)">${esc(msg)}</p>`,
    `<button class="btn" onclick="closeModal()">Cancelar</button><button class="btn dgr" id="cfYes">Eliminar</button>`);
  $("cfYes").onclick=()=>{closeModal();onYes();};
}
let toastT;
function toast(msg){
  const el=document.createElement("div");el.className="toast";el.textContent=msg;
  $("toasts").appendChild(el);setTimeout(()=>el.remove(),2200);
}
// generic form modal: fields=[{key,label,type,val,opts,step}]
function openForm(title,fields,onSave,saveLabel){
  const body=`<div class="form-grid">`+fields.map((f,i)=>{
    const id="f_"+i;
    if(f.type==="select")
      return `<div class="field" ${f.full?'style="grid-column:1/-1"':''}><label>${esc(f.label)}</label><select class="inp" id="${id}">${f.opts.map(o=>`<option value="${esc(o.v)}" ${o.v==f.val?'selected':''}>${esc(o.t)}</option>`).join("")}</select></div>`;
    if(f.type==="check")
      return `<div class="field" style="flex-direction:row;align-items:center;gap:10px"><label class="toggle"><input type="checkbox" id="${id}" ${f.val?'checked':''}><span class="sl"></span></label><label style="margin:0">${esc(f.label)}</label></div>`;
    if(f.type==="textarea")
      return `<div class="field" style="grid-column:1/-1"><label>${esc(f.label)}</label><textarea class="inp" id="${id}" rows="2">${esc(f.val||"")}</textarea></div>`;
    return `<div class="field" ${f.full?'style="grid-column:1/-1"':''}><label>${esc(f.label)}</label><input class="inp" id="${id}" type="${f.type||'text'}" ${f.step?`step="${f.step}"`:''} value="${esc(f.val==null?'':f.val)}"></div>`;
  }).join("")+`</div>`;
  openModal(title,body,`<button class="btn" onclick="closeModal()">Cancelar</button><button class="btn pri" id="frmSave">${saveLabel||"Guardar"}</button>`);
  $("frmSave").onclick=()=>{
    const o={};
    fields.forEach((f,i)=>{
      const el=$("f_"+i);
      if(f.type==="check")o[f.key]=el.checked;
      else if(f.type==="number")o[f.key]=el.value===""?null:parseFloat(el.value.replace(",","."));
      else o[f.key]=el.value;
    });
    onSave(o);closeModal();
  };
}
function add(coll,obj){obj.id=uid();S[coll].push(obj);dbUpsert(coll,obj);render();toast("Agregado");}

// ================================= VIEWS =====================================
function refOpts(tipo){return S.despensa.filter(d=>!tipo||d.tipo===tipo).map(d=>({v:d.nombre,t:d.nombre}));}

// ---- INICIO (dashboard propietario) ----
function vInicio(){
  const C=compute(), A=alerts(), saldo=saldoCaja(), uxe=C.uxe, t=todayISO();
  const mes=mesActualISO();
  const ventasMes=S.produccion.filter(p=>(p.fecha||"").slice(0,7)===mes).reduce((a,p)=>a+(p.vendidas||0),0);
  const stockU=S.produccion.reduce((a,p)=>a+((p.unidades||0)-(p.vendidas||0)),0);
  const cajasStock=Math.max(0,stockU/uxe);
  const tope=S.motor.topeFreezer||48;
  const abiertos=S.pedidos.filter(p=>!["entregado","retirado","cancelado"].includes(p.estado));
  const unidPedidas=abiertos.reduce((a,p)=>{const lp=S.listaPrecios.find(l=>l.nombre===p.variante);const u=lp?(lp.unidades||0):0;return a+u*(p.cantidad||0);},0);
  const alcanza=stockU>=unidPedidas;

  if(getModo()==="produccion"){
    const prox=abiertos.slice().sort((a,b)=>(a.fechaEntrega||"").localeCompare(b.fechaEntrega||""));
    const cardP=p=>{
      const lp=S.listaPrecios.find(l=>l.nombre===p.variante); const u=lp?(lp.unidades||0):0; const cajas=u?((p.cantidad||0)*u/uxe):0;
      const dias=p.fechaEntrega?Math.round((new Date(p.fechaEntrega)-new Date(t))/86400000):null;
      const tag=dias==null?'':(dias<0?`<span class="pill bad">atrasado</span>`:dias===0?`<span class="pill warn">hoy</span>`:dias===1?`<span class="pill info">mañana</span>`:`<span class="pill mut">en ${dias} días</span>`);
      return `<tr><td><b>${esc(p.clienteNombre||'—')}</b><div style="font-size:12px;color:var(--ink-faint)">${esc(p.variante||'')}</div></td>
        <td class="num"><b>${(p.cantidad||0)*u} u</b><div style="font-size:12px;color:var(--ink-faint)">${cajas.toLocaleString(LOCALE,{maximumFractionDigits:1})} cajas</div></td>
        <td>${fdate(p.fechaEntrega)} ${tag}</td></tr>`;
    };
    return pageH("Producción · "+fdate(t),"Pedidos a preparar. Tocá Pedidos para el detalle.")+
      `<div class="grid kpis" style="margin-bottom:16px">
         <div class="kpi hero"><div class="l">Cajas en freezer</div><div class="v">${Math.floor(cajasStock)} / ${tope}</div></div>
         <div class="kpi kraft"><div class="l">Pedidos por entregar</div><div class="v">${abiertos.length}</div><div class="s">${unidPedidas} u pedidas</div></div>
       </div>
       <div class="card"><div class="card-h"><h2>Por preparar / entregar</h2></div>
        <div class="card-b flush scroll-x">${prox.length?`<table class="tbl"><thead><tr><th>Cliente</th><th>Cantidad</th><th>Entrega</th></tr></thead><tbody>${prox.map(cardP).join("")}</tbody></table>`:empty("✅","No hay pedidos pendientes.")}</div></div>`;
  }

  const Y=new Date().getFullYear();
  const meses=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
  const serie=meses.map((lab,i)=>{const mm=Y+"-"+String(i+1).padStart(2,"0");return {label:lab,value:S.produccion.filter(p=>(p.fecha||"").slice(0,7)===mm).reduce((a,p)=>a+(p.vendidas||0),0)};});

  const kpis=`
    <div class="kpi hero"><div class="l">Unidades vendidas este mes</div><div class="v">${ventasMes}</div><div class="s">${fdate(t)}</div></div>
    <div class="kpi kraft"><div class="l">Cajas en freezer</div><div class="v">${Math.floor(cajasStock)} / ${tope}</div><div class="s">producidas − vendidas, ÷ ${uxe}</div></div>
    <div class="kpi"><div class="l">Pedidos abiertos</div><div class="v">${abiertos.length}</div><div class="s ${alcanza?'':'neg'}">${alcanza?'el stock alcanza':'falta stock'} (${unidPedidas} u)</div></div>
    <div class="kpi"><div class="l">Saldo de caja</div><div class="v ${saldo<0?'neg':''}">${money(saldo)}</div><div class="s">ingresos − egresos</div></div>
    <div class="kpi"><div class="l">Precio fijado / caja</div><div class="v">${money(C.precio_fijo_caja)}</div><div class="s">${money2(C.precio_fijo_u)}/u</div></div>
    <div class="kpi ${C.precio_bajo_costo?'':'kraft'}"><div class="l">Margen real al precio fijado</div><div class="v ${C.precio_bajo_costo?'neg':''}">${pct(C.margen_real)}</div><div class="s">gana ${money2(C.gan_real_u)}/u sobre el costo real</div></div>
    <div class="kpi"><div class="l">Costo de producir 1 u</div><div class="v">${money2(C.directo_u)}</div><div class="s">ingred+tapa ${money2(C.ingred_u)} + caja ${money2(C.pack_u)}${C.mano_u?` + mano ${money2(C.mano_u)}`:''}</div></div>
    <div class="kpi"><div class="l">Equilibrio del mes</div><div class="v">${C.equilibrio} u</div><div class="s">para cubrir los fijos</div></div>`;
  const alertCard = A.length
    ? `<div class="card"><div class="card-h"><h2>🔔 Alertas <span class="pill bad">${A.length}</span></h2><button class="btn sm" onclick="go('alertas')">Ver todas</button></div><div class="card-b">${A.slice(0,4).map(a=>alertHTML(a)).join("")}</div></div>`
    : `<div class="card"><div class="card-b"><div class="alert ok"><span class="ai">✅</span><div><b>Todo en orden</b><p>No hay alertas activas.</p></div></div></div></div>`;
  return pageH("Inicio", "Resumen del negocio · Mendoza · "+fdate(t))+
    `<div class="grid kpis" style="margin-bottom:18px">${kpis}</div>`+
    `<div class="card"><div class="card-h"><h2>Ventas por mes · ${Y}</h2><div class="sub">unidades vendidas, mes a mes</div></div><div class="card-b">${barChart(serie)}</div></div>`+
    `<div class="split">
       ${alertCard}
       <div class="card"><div class="card-h"><h2>De dónde sale el precio</h2></div><div class="card-b">
         <div class="hint" style="margin-bottom:10px">Precio sugerido = costo real por u ÷ (1 − margen ${pct(S.motor.margen)}) = <b>${money2(C.precio_u)}</b>. Vos cobrás <b>${money2(C.precio_fijo_u)}</b> → ${C.precio_fijo_u>=C.precio_u?'estás por encima del sugerido 👍':'estás por debajo del sugerido'}.</div>
         <div class="grid kpis" style="grid-template-columns:1fr 1fr">
           <div class="kpi"><div class="l">Costo real / u (sostenible)</div><div class="v">${money2(C.sostenible_u)}</div></div>
           <div class="kpi"><div class="l">Lo que pago hoy / u</div><div class="v">${money2(C.caja_u)}</div></div>
         </div>
       </div></div>
     </div>`;
}
function alertHTML(a){return `<div class="alert ${a.t}"><span class="ai">${a.ic}</span><div><b>${esc(a.b)}</b><p>${esc(a.p)}</p></div></div>`;}

// ---- CALCULADORA (motor) ----
function vCalc(){
  const C=compute(),m=S.motor;
  const out=(l,v,s,cls)=>`<div class="kpi ${cls||''}"><div class="l">${l}</div><div class="v">${v}</div>${s?`<div class="s">${s}</div>`:""}</div>`;
  return pageH("Calculadora de precio","Cambiá las variables de simulación y todo se recalcula al instante.")+
  `<div class="card"><div class="card-h"><h2>Variables de simulación</h2><div class="sub">Cambialas para probar escenarios</div></div><div class="card-b">
     <div class="form-grid">
       <div class="field"><label>Unidades estimadas por mes</label><input class="inp" type="number" value="${m.volumen}" onchange="setMotor('volumen',this.value)"><div class="hint" style="margin:4px 0 0">Para repartir los gastos fijos entre las unidades del mes.</div></div>
       <div class="field"><label>Margen objetivo (0–1)</label><input class="inp" type="number" step="0.01" value="${m.margen}" onchange="setMotor('margen',this.value)"></div>
       <div class="field"><label>Margen de imprevistos (0–1)</label><input class="inp" type="number" step="0.01" value="${m.buffer}" onchange="setMotor('buffer',this.value)"><div class="hint" style="margin:4px 0 0">Colchón por roturas, mermas o errores.</div></div>
       <div class="field"><label>Unidades por caja</label><input class="inp" type="number" value="${m.unidadesPorEnvase}" onchange="setMotor('unidadesPorEnvase',this.value)"></div>
       <div class="field"><label>Rendimiento (u / tanda 4 kg)</label><input class="inp" type="number" value="${(C.rend).toLocaleString(LOCALE,{maximumFractionDigits:0})}" disabled style="opacity:.7"><div class="hint" style="margin:4px 0 0">Se calcula solo desde la receta.</div></div>
     </div>
     <div class="hint" style="margin-top:14px">Margen ${pct(m.margen)} · Imprevistos ${pct(m.buffer)}. El costo de ingredientes y caja sale de <b>Despensa</b> y <b>Receta</b>; los fijos, de <b>Costos</b> e <b>Inversión</b>.</div>
   </div></div>
   <div class="card"><div class="card-h"><h2>Resultados</h2></div><div class="card-b">
     <div class="grid kpis">
       ${out("PRECIO SUGERIDO / U",money2(C.precio_u),"costo real por u ÷ (1 − margen)","hero")}
       ${out("PRECIO QUE COBRÁS / CAJA",money(C.precio_fijo_caja),`${money2(C.precio_fijo_u)}/u · fijado por vos`,"kraft")}
       ${out("Costo de producir 1 u",money2(C.directo_u),"ingredientes + tapa + caja")}
       ${out("Costo real por u (sostenible)",money2(C.sostenible_u),"con fijos + amortización")}
       ${out("Lo que pago hoy / u",money2(C.caja_u),"sale del bolsillo ahora")}
       ${out("Ganancia por unidad",money2(C.contrib_u),"precio − costo de producir")}
       ${out("Reserva por u (colchón)",money2(C.colchon_u),"costo real − lo que pago hoy")}
       ${out("Margen real al precio fijado",pct(C.margen_real),`gana ${money2(C.gan_real_u)}/u`)}
       ${out("% carne en el costo",pct(C.pct_carne),money2(C.carne_u)+"/u")}
       ${out("Punto de equilibrio",C.equilibrio+" u/mes","para cubrir los fijos")}
     </div>
     <div class="card" style="margin-top:14px;border-color:var(--kraft)"><div class="card-b">
       <div class="field"><label>Precio que cobrás por caja (${C.uxe} u)</label><input class="inp" type="number" value="${Math.round(C.precio_fijo_caja)}" onchange="setPrecioCaja(this.value)"><div class="hint" style="margin:4px 0 0">Lo fijás vos. El sistema no lo cambia: solo te avisa si queda por debajo del costo real (${money2(C.sostenible_u)}/u).</div></div>
     </div></div>
     <div class="hint" style="margin-top:16px">
       <b>Desglose mensual:</b> fijos totales ${money(C.fijos_imp_mes)} · fijos que pago hoy ${money(C.fijos_caja_mes)} · amortización ${money(C.amort_mes)} · cuotas activas ${money(C.cuota_caja_mes)}.
     </div>
   </div></div>`;
}

// ---- RECETA ----
function toggleRecetaLock(){
  if(S.motor.recetaLock===false){ S.motor.recetaLock=true; save(); render(); toast("🔒 Receta bloqueada"); }
  else { confirmBox("Desbloquear receta","La receta es la base de TODO el costeo. Desbloqueá solo si vas a corregir la fórmula real (lo hace Cheo). ¿Seguimos?",()=>{S.motor.recetaLock=false;save();render();toast("🔓 Receta desbloqueada");}); }
}
function vReceta(){
  const C=compute(),m=S.motor;
  const locked=m.recetaLock!==false;
  const fila=(coll,r)=>{
    const cost=(r.cantidad||0)*usoOf(r.ref);
    if(locked){
      return `<tr><td><b>${esc(r.ref)}</b></td>
        <td class="num">${(r.cantidad??0).toLocaleString(LOCALE,{maximumFractionDigits:2})}</td>
        <td style="width:50px">${esc(r.unidad||'')}</td>
        <td class="calc">${money2(usoOf(r.ref))}</td>
        <td class="calc">${money2(cost)}</td></tr>`;
    }
    return `<tr>
      <td style="min-width:150px"><select onchange="edit('${coll}','${r.id}','ref',this.value)">${S.despensa.map(d=>`<option ${d.nombre===r.ref?'selected':''}>${esc(d.nombre)}</option>`).join("")}</select></td>
      <td style="width:110px"><input class="num" type="number" step="0.01" value="${r.cantidad??''}" onchange="edit('${coll}','${r.id}','cantidad',this.value,1)"></td>
      <td style="width:60px"><input class="num" style="width:46px" value="${esc(r.unidad||'')}" onchange="edit('${coll}','${r.id}','unidad',this.value)"></td>
      <td class="calc">${money2(usoOf(r.ref))}</td>
      <td class="calc">${money2(cost)}</td>
      <td><button class="row-x" onclick="delRow('${coll}','${r.id}','${esc(r.ref)}')">×</button></td></tr>`;
  };
  const head=`<thead><tr><th>Componente</th><th>Cant./sfija</th><th>Un.</th><th>$/uso</th><th>Costo/sfija</th>${locked?'':'<th></th>'}</tr></thead>`;
  const addR=`onclick="openForm('Agregar a la receta',[{key:'ref',label:'Insumo',type:'select',opts:refOpts('ing'),full:true},{key:'cantidad',label:'Cantidad por sfija',type:'number'},{key:'unidad',label:'Unidad',val:'g'}],o=>add('recetaRelleno',o))"`;
  const packFila=r=>{
    const cost=(r.cantidad||0)*usoOf(r.ref);
    if(locked) return `<tr><td><b>${esc(r.ref)}</b></td><td class="num">${r.cantidad??0}</td><td class="calc">${money2(usoOf(r.ref))}</td><td class="calc">${money2(cost)}</td></tr>`;
    return `<tr>
      <td><select onchange="edit('packagingEnvase','${r.id}','ref',this.value)">${S.despensa.filter(d=>d.tipo==='pack').map(d=>`<option ${d.nombre===r.ref?'selected':''}>${esc(d.nombre)}</option>`).join("")}</select></td>
      <td style="width:110px"><input class="num" type="number" value="${r.cantidad??''}" onchange="edit('packagingEnvase','${r.id}','cantidad',this.value,1)"></td>
      <td class="calc">${money2(usoOf(r.ref))}</td><td class="calc">${money2(cost)}</td>
      <td><button class="row-x" onclick="delRow('packagingEnvase','${r.id}','${esc(r.ref)}')">×</button></td></tr>`;
  };
  const rend_tanda=C.rend_kg*4, rend_8=C.rend_kg*8;

  const lockBar=`<div class="card" style="margin-bottom:16px;border-color:${locked?'var(--line)':'var(--kraft)'}">
    <div class="card-b" style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap">
      <div><b>${locked?'🔒 Receta bloqueada':'🔓 Receta desbloqueada (editando)'}</b>
        <div class="hint" style="margin:4px 0 0">${locked?'La fórmula está protegida para que no se cambie sin querer. Es la base de todo el costeo.':'Cuidado: estás editando la fórmula real. Cuando termines, volvé a bloquearla.'}</div></div>
      <button class="btn ${locked?'kr':'pri'} sm" onclick="toggleRecetaLock()">${locked?'Desbloquear':'Bloquear'}</button>
    </div></div>`;

  return pageH("Receta","La fórmula real de una sfija. Si cambia acá, cambia TODO el costeo.")+
   lockBar+
   `<div class="card"><div class="card-h"><h2>Una sfija lleva</h2>${locked?'':`<button class="btn kr sm" ${addR}>+ Componente</button>`}</div>
     <div class="card-b flush scroll-x"><table class="tbl">${head}<tbody>${S.recetaRelleno.map(r=>fila('recetaRelleno',r)).join("")}</tbody>
     <tfoot>
       <tr><td colspan="${locked?4:5}">Relleno por sfija (sin tapa)</td><td class="num">${C.relleno_g.toLocaleString(LOCALE,{maximumFractionDigits:1})} g</td>${locked?'':'<td></td>'}</tr>
       <tr><td colspan="${locked?4:5}"><b>Costo ingredientes + tapa / unidad</b></td><td class="num"><b>${money2(C.ingred_u)}</b></td>${locked?'':'<td></td>'}</tr>
     </tfoot></table></div>
     <div class="card-b"><div class="hint">Cada costo sale de la Despensa: <b>$/uso × cantidad</b>. Ej.: carne ${money2(usoOf("Carne (aguja/intermedia)"))}/g × ${C.carne_g_u} g = ${money2(C.carne_u)} por sfija. El relleno da ~${C.relleno_g.toLocaleString(LOCALE,{maximumFractionDigits:0})} g y la tapa va aparte.</div></div>
   </div>

   <div class="split">
     <div class="card"><div class="card-h"><h2>Rendimiento (se calcula solo)</h2></div><div class="card-b">
       <div class="grid kpis" style="grid-template-columns:1fr 1fr">
         <div class="kpi"><div class="l">Carne por unidad</div><div class="v">${C.carne_g_u} g</div><div class="s">de la receta</div></div>
         <div class="kpi kraft"><div class="l">Unidades por kg</div><div class="v">${C.rend_kg.toLocaleString(LOCALE,{maximumFractionDigits:1})}</div><div class="s">1000 g ÷ ${C.carne_g_u} g</div></div>
         <div class="kpi"><div class="l">Por tanda (4 kg)</div><div class="v">${rend_tanda.toLocaleString(LOCALE,{maximumFractionDigits:0})} u</div></div>
         <div class="kpi"><div class="l">Estándar 8 kg (2 tandas)</div><div class="v">${rend_8.toLocaleString(LOCALE,{maximumFractionDigits:0})} u</div></div>
       </div>
       <div class="hint" style="margin-top:12px">Ya no se carga a mano: sale de cuánta carne lleva cada sfija. Si cambia la carne por unidad, el rinde se recalcula solo.</div>
     </div></div>

     <div class="card"><div class="card-h"><h2>Caja / envase</h2>${locked?'':`<button class="btn kr sm" onclick="openForm('Agregar al envase',[{key:'ref',label:'Ítem',type:'select',opts:refOpts('pack'),full:true},{key:'cantidad',label:'Cantidad',type:'number',val:1}],o=>add('packagingEnvase',o))">+</button>`}</div>
      <div class="card-b flush scroll-x"><table class="tbl"><thead><tr><th>Componente</th><th>Cant.</th><th>$/uso</th><th>Costo</th>${locked?'':'<th></th>'}</tr></thead>
      <tbody>${S.packagingEnvase.map(packFila).join("")}</tbody>
      <tfoot><tr><td colspan="3">Caja completa (${C.uxe} u)</td><td class="num">${money2(C.packEnvase)}</td>${locked?'':'<td></td>'}</tr>
             <tr><td colspan="3">Caja por unidad</td><td class="num">${money2(C.pack_u)}</td>${locked?'':'<td></td>'}</tr></tfoot></table></div>
      <div class="card-b"><div class="hint">La caja se reparte entre las ${C.uxe} unidades que entran: ${money2(C.packEnvase)} ÷ ${C.uxe} = ${money2(C.pack_u)}/u.</div></div>
     </div>
   </div>

   <div class="card"><div class="card-b"><div class="grid kpis" style="grid-template-columns:1fr 1fr 1fr">
      <div class="kpi"><div class="l">Ingredientes + tapa / u</div><div class="v">${money2(C.ingred_u)}</div></div>
      <div class="kpi"><div class="l">Caja / u</div><div class="v">${money2(C.pack_u)}</div></div>
      <div class="kpi hero"><div class="l">Costo de producir 1 unidad</div><div class="v">${money2(C.directo_u)}</div><div class="s">ingredientes + tapa + caja</div></div>
    </div></div></div>`;
}

// ---- SIMULADOR DE PRODUCCIÓN (Bloque 5) ----
function vSimulador(){
  const C=compute(), uxe=C.uxe, carne_g=C.carne_g_u||1;
  const kg=simKg;
  const unidades=carne_g>0?Math.floor(kg*1000/carne_g):0;
  const sobranteU=carne_g>0?((kg*1000/carne_g)-unidades):0;
  const cajas=unidades/uxe;
  const tandas=kg/4;
  const tope=S.motor.topeFreezer||48;
  const stockU=S.produccion.reduce((a,p)=>a+((p.unidades||0)-(p.vendidas||0)),0);
  const cajasStock=stockU/uxe;
  const cajasTotal=cajasStock+cajas;
  const excede=cajasTotal>tope;
  const costoTotal=unidades*C.directo_u;
  const ingreso=unidades*C.precio_fijo_u;
  const ganancia=ingreso-unidades*C.directo_u;
  const fmtCant=(n,u)=>u==='g'?(n>=1000?(n/1000).toLocaleString(LOCALE,{maximumFractionDigits:2})+' kg':n.toLocaleString(LOCALE,{maximumFractionDigits:0})+' g'):(n.toLocaleString(LOCALE,{maximumFractionDigits:0})+' '+(u||'u'));
  const ingRows=S.recetaRelleno.map(r=>{
    const necesito=(r.cantidad||0)*unidades;
    const ins=S.despensa.find(d=>d.nombre===r.ref);
    const cont=ins?(ins.contenido||0):0;
    const packs=cont>0?Math.ceil(necesito/cont):0;
    const sobra=cont>0?(packs*cont-necesito):0;
    return `<tr>
      <td><b>${esc(r.ref)}</b><div style="font-size:11px;color:var(--ink-faint)">${esc(ins?ins.compra:'')}</div></td>
      <td class="num">${fmtCant(necesito,r.unidad)}</td>
      <td class="num">${cont?`<b>${packs}</b> × ${cont}${r.unidad}`:'—'}${sobra>0?`<div style="font-size:11px;color:var(--ink-faint)">sobra ${fmtCant(sobra,r.unidad)}</div>`:''}</td>
      <td class="num">${money(necesito*usoOf(r.ref))}</td></tr>`;
  }).join("");
  return pageH("Simulador de producción","Poné los kilos de carne y te dice todo: unidades, qué comprar y la ganancia.")+
   `<div class="card"><div class="card-b">
      <div class="form-grid">
        <div class="field"><label>Kilos de carne</label><input class="inp" type="number" step="0.5" value="${kg}" onchange="setSimKg(this.value)"><div class="hint" style="margin:4px 0 0">Estándar: 8 kg = 2 tandas de 4 kg.</div></div>
        <div class="field"><label>Equivale a</label><input class="inp" value="${tandas.toLocaleString(LOCALE,{maximumFractionDigits:1})} tandas de 4 kg" disabled style="opacity:.7"></div>
      </div>
      <div class="hint" style="margin-top:10px">Flujo: tanda 1 (4 kg) → precongelado → envasado → tanda 2 → bolsas → cajas → freezer.</div>
   </div></div>
   <div class="grid kpis" style="margin-bottom:16px">
     <div class="kpi hero"><div class="l">Unidades</div><div class="v">${unidades}</div><div class="s">${kg} kg ÷ ${carne_g} g${sobranteU>=1?` (+${Math.floor(sobranteU)} de sobrante)`:''}</div></div>
     <div class="kpi kraft"><div class="l">Cajas (${uxe} u)</div><div class="v">${cajas.toLocaleString(LOCALE,{maximumFractionDigits:1})}</div></div>
     <div class="kpi"><div class="l">Costo total</div><div class="v">${money(costoTotal)}</div><div class="s">${money2(C.directo_u)}/u · ${money(C.directo_u*uxe)}/caja</div></div>
     <div class="kpi"><div class="l">Ganancia al precio fijado</div><div class="v pos">${money(ganancia)}</div><div class="s">vende ${money(ingreso)}</div></div>
   </div>
   ${excede?`<div class="card" style="border-color:var(--bad);margin-bottom:16px"><div class="card-b"><div class="alert bad"><span class="ai">🧊</span><div><b>Supera el tope del freezer</b><p>Tenés ${Math.floor(cajasStock)} cajas en stock + ${cajas.toLocaleString(LOCALE,{maximumFractionDigits:0})} nuevas = ${cajasTotal.toLocaleString(LOCALE,{maximumFractionDigits:0})}, y el tope es ${tope}. Producí menos o vendé antes.</p></div></div></div></div>`
     :`<div class="hint" style="margin-bottom:16px">Freezer: ${Math.floor(cajasStock)} en stock + ${cajas.toLocaleString(LOCALE,{maximumFractionDigits:0})} nuevas = ${cajasTotal.toLocaleString(LOCALE,{maximumFractionDigits:0})} / ${tope} cajas. ✅ Entra.</div>`}
   <div class="card"><div class="card-h"><h2>Lista de compra</h2><div class="sub">"Necesito" = exacto · "Comprar" = packs enteros</div></div>
     <div class="card-b flush scroll-x"><table class="tbl"><thead><tr><th>Insumo</th><th>Necesito</th><th>Comprar</th><th>Costo</th></tr></thead><tbody>${ingRows}</tbody>
     <tfoot><tr><td colspan="3"><b>Costo de ingredientes + tapa</b></td><td class="num"><b>${money(unidades*C.ingred_u)}</b></td></tr></tfoot></table></div></div>`;
}

function reponerStock(id){
  const d=dlu("despensa",id); if(!d)return;
  openForm("Reponer / comprar · "+d.nombre,[
    {key:"cantidad",label:`Cantidad que entra (${d.unidad||'u'})`,type:"number"},
    {key:"precioNuevo",label:"Precio pagado del pack (opcional)",type:"number",val:d.precio??""},
    {key:"proveedor",label:"Proveedor",type:"select",opts:[{v:"",t:"— sin proveedor —"}].concat(S.proveedores.map(p=>({v:p.nombre,t:p.nombre})))},
  ],o=>{
    const ant=d.precio||0, nue=o.precioNuevo||0;
    if(nue && nue!==ant){ logPrecio(d, ant, nue, o.proveedor||null); d.precio=nue; }
    d.stock=(d.stock||0)+(o.cantidad||0);
    dbUpsert("despensa",d); render(); toast("Stock actualizado");
  });
}
function vStock(){
  const ins=S.despensa.slice().sort((a,b)=>a.tipo===b.tipo?0:(a.tipo==='ing'?-1:1));

  const rows=ins.map(d=>{
    const v=(d.stock||0)*usoOf(d.nombre); valor+=v;
    const bajo=d.stockMin!=null&&d.stock!=null&&d.stock<d.stockMin;
    return `<tr class="${bajo?'rowbad':''}">
      <td><b>${esc(d.nombre)}</b><div style="font-size:11px;color:var(--ink-faint)">${esc(d.compra||'')}</div></td>
      <td><input class="num" type="number" value="${d.stock??''}" placeholder="—" onchange="edit('despensa','${d.id}','stock',this.value,1)"> ${esc(d.unidad||'')}</td>

// ---- export/import ----
function exportJSON(){
  const blob=new Blob([JSON.stringify(S,null,2)],{type:"application/json"});
  dl(blob,`sfija_respaldo_${todayISO()}.json`); toast("Respaldo descargado");
}
function importJSON(file){
  if(!file)return; const r=new FileReader();
  r.onload=()=>{try{const o=JSON.parse(r.result); if(!o.motor||!o.despensa)throw 0; CUR="inicio"; dbReplaceAll(o); toast("Respaldo restaurado");}catch(e){toast("⚠️ Archivo inválido");}};
  r.readAsText(file);
}
function exportCSV(coll){
  const arr=S[coll]||[]; if(!arr.length){toast("Nada para exportar");return;}
  const keys=[...new Set(arr.flatMap(o=>Object.keys(o)))].filter(k=>k!=="id");
  const esc=v=>`"${String(v==null?"":v).replace(/"/g,'""')}"`;
  const csv=[keys.join(",")].concat(arr.map(o=>keys.map(k=>esc(o[k])).join(","))).join("\n");
  dl(new Blob(["\ufeff"+csv],{type:"text/csv"}),`sfija_${coll}_${todayISO()}.csv`);
}
function dl(blob,name){const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000);}
function resetAll(){confirmBox("¿Borrar todo?","Vas a borrar los datos de TODOS (vos y Sole) y volver al ejemplo inicial. Hacé un respaldo antes.",()=>{CUR="inicio";dbReplaceAll(seed());toast("Reiniciado");});}

function syncPill(state){const p=$("syncpill");if(!p)return;
  if(state==="saving"){p.textContent="Guardando…";p.className="syncpill on";}
  else if(state==="ok"){p.textContent="✓ Guardado";p.className="syncpill on";clearTimeout(syncPill._t);syncPill._t=setTimeout(()=>{p.className="syncpill";},1100);}
  else if(state==="err"){p.textContent="⚠️ Sin conexión";p.className="syncpill on off";}
}

async function dbUpsert(coll,row){
  const tbl=COLL2TBL[coll]; if(!tbl)return;
  const {id,...rest}=row; suppressEcho.add(id); syncPill("saving");
  const {error}=await sb.from(tbl).upsert({id,data:rest},{onConflict:"id"});
  syncPill(error?"err":"ok"); if(error)toast("⚠️ No se pudo guardar");
  setTimeout(()=>suppressEcho.delete(id),1500);
}
async function dbDelete(coll,id){

}

async function dbReplaceAll(newS){
  syncPill("saving");
  try{
    for(const [coll,tbl] of Object.entries(COLL2TBL)){
      await sb.from(tbl).delete().neq("id","00000000-0000-0000-0000-000000000000");

        return {id:uu,data:rest};});

// ---------------------------------------------------------------- ENGINE
function usoOf(ref){const d=S.despensa.find(x=>x.nombre===ref); if(!d||!d.contenido)return 0; return (d.precio||0)/d.contenido;}
function compute(){
  const m=S.motor, vol=m.volumen||1, uxe=m.unidadesPorEnvase||1, buf=m.buffer||0;
  const costRow=r=>(r.cantidad||0)*usoOf(r.ref);
  // La receta es POR UNIDAD: cada línea es lo que lleva 1 sfija.
  const ingred_u=S.recetaRelleno.reduce((a,r)=>a+costRow(r),0);
  const carneRow=S.recetaRelleno.find(r=>/carne/i.test(r.ref));
  const carne_g_u=carneRow?(carneRow.cantidad||0):0;          // g de carne por unidad
  const rend_kg=carne_g_u>0?1000/carne_g_u:0;                 // unidades por kg de carne
  const rend=rend_kg*4;                                       // unidades por tanda (4 kg)
  const relleno_g=S.recetaRelleno.filter(r=>(r.unidad||'')==='g').reduce((a,r)=>a+(r.cantidad||0),0);

  const packEnvase=S.packagingEnvase.reduce((a,r)=>a+costRow(r),0);
  const pack_u=packEnvase/uxe;

  // --- Mano de obra (Bloque 3) ---
  const mano=m.mano||{};
  const rendTanda=rend_kg*4;
  const gPorU=ref=>{const r=S.recetaRelleno.find(x=>new RegExp(ref,'i').test(x.ref)); return r?(r.cantidad||0):0;};
  const mano_gen_u = (rendTanda>0)? ((mano.horaProd||0)*(mano.horasTanda||0))/rendTanda : 0;
  const prep_cebolla_u = (gPorU('cebolla')/1000)*(mano.cebollaKg||0);
  const prep_limon_u   = (gPorU('lim[oó]n')/1000)*(mano.limonKg||0);
  const prep_menta_u   = (gPorU('menta')/50)*(mano.mentaAtado||0); // ~50 g por atado
  const mano_u = mano_gen_u + prep_cebolla_u + prep_limon_u + prep_menta_u;

  const directo_u=ingred_u+pack_u+mano_u;

  const fijos_imp_mes=
    S.costosFijos.reduce((a,x)=>a+(x.monto||0),0)+
    S.costosServicios.reduce((a,x)=>a+((x.monto||0)/(x.vidaUtil||1)),0)+
    S.costosSemivar.reduce((a,x)=>a+((x.monto||0)*(x.cant||0)),0)+
    S.costosOtros.reduce((a,x)=>a+(x.monto||0),0);
  const fijos_caja_mes=
    S.costosFijos.reduce((a,x)=>a+(x.pagaHoy?(x.monto||0):0),0)+
    S.costosServicios.reduce((a,x)=>a+(x.pagaHoy?((x.monto||0)/(x.vidaUtil||1)):0),0)+
    S.costosSemivar.reduce((a,x)=>a+(x.pagaHoy?((x.monto||0)*(x.cant||0)):0),0)+
    S.costosOtros.reduce((a,x)=>a+(x.pagaHoy?(x.monto||0):0),0);
  const amort_mes=S.equipos.reduce((a,e)=>a+((e.costo||0)/(e.vidaUtil||1)),0);
  const cuota_caja_mes=S.equipos.reduce((a,e)=>a+((e.cuotaActiva&&e.financiado)?((e.costo||0)/(e.cuotas||1)):0),0);

  const sostenible_u=(directo_u + fijos_imp_mes/vol + amort_mes/vol)*(1+buf);
  const caja_u=(directo_u + fijos_caja_mes/vol + cuota_caja_mes/vol)*(1+buf);
  const precio_u=sostenible_u/(1-(m.margen||0));
  const precio_envase=precio_u*uxe;
  // --- Precio FIJADO manualmente (Bloque 8) ---
  const precio_fijo_u = (m.precioFijoU!=null? m.precioFijoU : 2333.33);
  const precio_fijo_caja = precio_fijo_u*uxe;
  const margen_real = precio_fijo_u? (precio_fijo_u - sostenible_u)/precio_fijo_u : 0;
  const gan_real_u = precio_fijo_u - sostenible_u;
  const precio_bajo_costo = precio_fijo_u < sostenible_u;
  const contrib_u=precio_fijo_u-directo_u;
  const colchon_u=sostenible_u-caja_u;
  const ganancia_sost_u=precio_u-sostenible_u;
  const margen_caja=precio_fijo_u? (precio_fijo_u-caja_u)/precio_fijo_u : 0;
  const carne_u=carneRow? costRow(carneRow) : 0;
  const pct_carne=sostenible_u? carne_u/sostenible_u : 0;
  const equilibrio=contrib_u>0? Math.ceil(fijos_imp_mes/contrib_u):0;

  return {ingred_u,packEnvase,pack_u,directo_u,relleno_g,carne_g_u,rend_kg,
    mano_u,mano_gen_u,prep_cebolla_u,prep_limon_u,prep_menta_u,
    fijos_imp_mes,fijos_caja_mes,amort_mes,cuota_caja_mes,
    sostenible_u,caja_u,precio_u,precio_envase,
    precio_fijo_u,precio_fijo_caja,margen_real,gan_real_u,precio_bajo_costo,
    contrib_u,colchon_u,ganancia_sost_u,margen_caja,carne_u,pct_carne,equilibrio,vol,rend,uxe,buf};
}
function saldoCaja(){return S.caja.reduce((a,m)=>a+(m.ingreso||0)-(m.egreso||0),0);}

// ---------------------------------------------------------------- ALERTS
function alerts(){
  const A=[], cfg=S.alertCfg, t=todayISO(), C=compute();
  const saldo=saldoCaja();
  if(saldo<cfg.cajaMin) A.push({t:"bad",ic:"💵",b:"Caja baja",p:`Saldo ${money(saldo)} por debajo del mínimo (${money(cfg.cajaMin)}).`});
  const activos=["borrador","pendiente","confirmado","programado","en produccion","listo"];
  S.pedidos.forEach(p=>{
    if(!activos.includes(p.estado)) return;
    if(!p.fechaEntrega) return;
    const dias=Math.round((new Date(p.fechaEntrega)-new Date(t))/86400000);
    if(dias<0) A.push({t:"bad",ic:"🧾",b:`Pedido atrasado · ${p.clienteNombre||"s/cliente"}`,p:`Entrega era ${fdate(p.fechaEntrega)} (${-dias} día/s).`});
    else if(dias<=cfg.diasEntrega) A.push({t:"warn",ic:"🧾",b:`Pedido próximo · ${p.clienteNombre||"s/cliente"}`,p:`Entrega ${fdate(p.fechaEntrega)} · ${money(p.total||0)}.`});
  });
  S.pedidos.forEach(p=>{
    if(p.estadoPago==="pendiente" || p.estadoPago==="parcial"){
      const saldoP=(p.total||0)-(p.sena||0);
      if(saldoP>0 && p.fechaEntrega && new Date(p.fechaEntrega)<new Date(t))
        A.push({t:"warn",ic:"💰",b:`Cobro pendiente · ${p.clienteNombre||""}`,p:`Saldo ${money(saldoP)}.`});
    }
  });
  S.despensa.forEach(d=>{
    if(d.stockMin!=null && d.stock!=null && d.stock<d.stockMin)
      A.push({t:"warn",ic:"🧂",b:`Stock bajo · ${d.nombre}`,p:`${numfmt(d.stock)} ${d.unidad} (mín ${numfmt(d.stockMin)}).`});
  });
  S.produccion.forEach(pr=>{
    const esp=(pr.tandas||0)*C.rend;
    if(esp>0 && pr.unidades!=null && pr.unidades < esp*(1-cfg.mermaMax))
      A.push({t:"warn",ic:"⚖️",b:`Merma alta · tanda ${fdate(pr.fecha)}`,p:`Rindió ${pr.unidades} de ${esp} esperadas.`});
  });
  const bajos=S.listaPrecios.filter(l=>{const sug=C.precio_u*(l.unidades||0);return sug>0&&(l.precio||0)<sug*0.98;});
  if(bajos.length) A.push({t:"warn",ic:"🏷️",b:"Precios por debajo del sugerido",p:`${bajos.length} variante/s conviene revisar (subieron costos). Mirá Proveedores.`});
  if(C.precio_bajo_costo) A.push({t:"bad",ic:"🏷️",b:"Precio por debajo del costo real",p:`Tu precio fijado (${money2(C.precio_fijo_u)}/u) está por debajo del costo sostenible (${money2(C.sostenible_u)}/u).`});
  // --- Freezer / tope (Bloque 5/9) ---
  const uxe=C.uxe||6, tope=S.motor.topeFreezer||48;
  const stockU=S.produccion.reduce((a,p)=>a+((p.unidades||0)-(p.vendidas||0)),0);
  const cajasStock=stockU/uxe;
  if(cajasStock>tope) A.push({t:"bad",ic:"🧊",b:"Freezer excedido",p:`${Math.floor(cajasStock)} cajas en stock; el tope es ${tope}.`});
  else if(cajasStock>=tope*0.9) A.push({t:"warn",ic:"🧊",b:"Freezer casi lleno",p:`${Math.floor(cajasStock)} de ${tope} cajas.`});
  // --- Alertas configurables (Bloque 9) ---
  (S.alertasCfg||[]).forEach(ac=>{
    if(ac.tipo==="stock_caja" && cajasStock < (ac.umbral||0)) A.push({t:"warn",ic:"📦",b:ac.nombre||"Stock bajo de cajas",p:`Quedan ${Math.floor(cajasStock)} cajas (mín ${ac.umbral}).`});
    if(ac.tipo==="suba"){ const subio=S.preciosHist.some(h=>{const d=(Date.now()-new Date(h.fecha).getTime())/86400000;return d<=60 && (h.deltaPct||0)*100>(ac.umbral||0);}); if(subio) A.push({t:"warn",ic:"📈",b:ac.nombre||"Suba de insumo",p:`Un insumo subió más de ${ac.umbral}% en 60 días.`}); }
    if(ac.tipo==="cumple"){ const today=new Date(); S.clientes.forEach(c=>{ if(!c.cumple)return; const md=String(c.cumple).slice(5); for(let k=0;k<=(ac.umbral||7);k++){const dd=new Date(today.getTime()+k*86400000); const mm=String(dd.getMonth()+1).padStart(2,"0")+"-"+String(dd.getDate()).padStart(2,"0"); if(md===mm){A.push({t:"info",ic:"🎂",b:`Cumple de ${c.nombre}`,p:k===0?"¡Es hoy!":`En ${k} día/s.`});break;}} }); }
  });
  return A;
}

// ---------------------------------------------------------------- ROUTER
const PAGES=[
  {id:"inicio",ic:"🏠",label:"Inicio",prod:true},
  {id:"calc",ic:"🧮",label:"Calculadora"},
  {id:"simulador",ic:"⚙️",label:"Simulador",prod:true},
  {id:"despensa",ic:"🧂",label:"Despensa"},
  {id:"stock",ic:"📦",label:"Stock",prod:true},
  {id:"receta",ic:"📋",label:"Receta"},
  {id:"costos",ic:"🏢",label:"Costos fijos"},
  {id:"inversion",ic:"🧊",label:"Inversión"},
  {id:"produccion",ic:"👨‍🍳",label:"Producción",prod:true},
  {id:"pedidos",ic:"🧾",label:"Pedidos",prod:true},
  {id:"compras",ic:"🛒",label:"Compras"},
  {id:"proveedores",ic:"🚚",label:"Proveedores"},
  {id:"caja",ic:"💵",label:"Caja"},
  {id:"alertas",ic:"🔔",label:"Alertas",prod:true},
  {id:"datos",ic:"💾",label:"Datos"},
];
let CUR="inicio";
function go(id){CUR=id; closeModal(); render(); presenceUpdate(); window.scrollTo(0,0);}
function buildNav(){
  const nAl=alerts().length;
  const prod=getModo()==="produccion";
  const pages=prod?PAGES.filter(p=>p.prod):PAGES;
  $("nav").innerHTML=pages.map(p=>`<button class="${p.id===CUR?'on':''}" onclick="go('${p.id}')"><span class="ic">${p.ic}</span>${p.label}${p.id==='alertas'&&nAl?`<span class="badge">${nAl}</span>`:''}</button>`).join("");
  const bot=prod?["inicio","pedidos","produccion","simulador","_more"]:["inicio","calc","pedidos","produccion","_more"];
  $("botnav").innerHTML=bot.map(id=>{
    if(id==="_more")return `<button onclick="moreSheet()"><span class="ic">☰</span>Más</button>`;
    const p=PAGES.find(x=>x.id===id);
    return `<button class="${id===CUR?'on':''}" onclick="go('${id}')"><span class="ic">${p.ic}</span>${p.label}${id==='pedidos'&&nAl?`<span class="badge">${nAl}</span>`:''}</button>`;
  }).join("");
  $("topAlert").innerHTML= nAl?`🔔 ${nAl}`:"🔔";
  $("sideFoot").innerHTML=`<div class="modo-sw">
      <button class="${prod?'':'on'}" onclick="setModo('gestion')">Gestión</button>
      <button class="${prod?'on':''}" onclick="setModo('produccion')">Producción</button>
    </div>
    ☁️ en la nube · v${APP_VER}<br>${S.despensa.length} insumos · ${S.pedidos.length} pedidos<br><button class="logout" onclick="doLogout()">Cerrar sesión${ME?` (${esc(ME.split("@")[0])})`:""}</button>`;
}
function moreSheet(){
  const prod=getModo()==="produccion";
  let items=PAGES.filter(p=>!["inicio","calc","pedidos","produccion"].includes(p.id));
  if(prod) items=items.filter(p=>p.prod);
  openModal("Menú", items.map(p=>`<button class="btn" style="width:100%;justify-content:flex-start;margin-bottom:8px" onclick="go('${p.id}')"><span style="margin-right:8px">${p.ic}</span>${p.label}</button>`).join(""), "");
}

// ---------------------------------------------------------------- RENDER
function render(){
  buildNav();
  const fn={inicio:vInicio,calc:vCalc,simulador:vSimulador,despensa:vDespensa,stock:vStock,receta:vReceta,costos:vCostos,
    inversion:vInversion,produccion:vProduccion,pedidos:vPedidos,compras:vCompras,proveedores:vProveedores,
    caja:vCaja,alertas:vAlertas,datos:vDatos}[CUR]||vInicio;
  $("view").innerHTML=fn();
}
function pageH(t,s,actions){return `<div class="page-h"><div><h1>${t}</h1>${s?`<p>${s}</p>`:""}</div>${actions?`<div class="row-actions" style="margin:0">${actions}</div>`:""}</div>`;}

// ---------------------------------------------------------------- AUTH / REALTIME / PRESENCIA
async function doLogin(){
  const email=$("lgEmail").value.trim(), pass=$("lgPass").value;
  const err=$("loginErr"); err.classList.remove("on");
  if(!email||!pass){err.textContent="Completá usuario y contraseña.";err.classList.add("on");return;}
  const b=$("lgBtn"); b.textContent="Entrando…"; b.disabled=true;
  const {data,error}=await sb.auth.signInWithPassword({email,password:pass});
  b.textContent="Entrar"; b.disabled=false;
  if(error){err.textContent="Usuario o contraseña incorrectos."; err.classList.add("on"); return;}
  initApp(data.session);
}
async function doLogout(){ try{if(PCH)await PCH.untrack();}catch(e){} await sb.auth.signOut(); location.reload(); }

let RTCH=null, PCH=null;

async function initApp(session){
  ME=session.user.email;
  $("loginWrap").classList.remove("on");
  $("app").style.display="";
  $("botnav").style.display="";
  await pullAll();
  bindOverlay();
  render();
  initRealtime();
  initPresence();
}

function initRealtime(){
  if(RTCH)sb.removeChannel(RTCH);
  RTCH=sb.channel("sfija-db");
  Object.entries(COLL2TBL).forEach(([coll,tbl])=>{
    RTCH.on("postgres_changes",{event:"*",schema:"public",table:tbl},payload=>{
      const id=(payload.new&&payload.new.id)||(payload.old&&payload.old.id);
      if(id&&suppressEcho.has(id))return;
      if(payload.eventType==="DELETE"){S[coll]=(S[coll]||[]).filter(x=>x.id!==payload.old.id);}
      else{const row={...payload.new.data,id:payload.new.id};
        const i=(S[coll]||[]).findIndex(x=>x.id===row.id);
        if(i>=0)S[coll][i]=row; else (S[coll]=S[coll]||[]).push(row);}
      render();
    });
  });
  RTCH.on("postgres_changes",{event:"*",schema:"public",table:"config"},payload=>{
    const d=payload.new&&payload.new.data; if(!d)return;
    S.motor=d.motor||S.motor; S.alertCfg=d.alertCfg||S.alertCfg; S.marca=d.marca||S.marca; render();
  });
  RTCH.subscribe();
}

function colorFor(s){let h=0;for(let i=0;i<(s||"").length;i++)h=s.charCodeAt(i)+((h<<5)-h);return `hsl(${Math.abs(h)%360} 52% 44%)`;}
const PAGEL={inicio:"Inicio",calc:"Calculadora",despensa:"Despensa",receta:"Receta",costos:"Costos",inversion:"Inversión",produccion:"Producción",pedidos:"Pedidos",compras:"Compras",caja:"Caja",alertas:"Alertas",datos:"Datos"};
function initPresence(){
  if(PCH)sb.removeChannel(PCH);
  PCH=sb.channel("sfija-presence",{config:{presence:{key:ME}}});
  PCH.on("presence",{event:"sync"},renderPresence);
  PCH.on("presence",{event:"join"},renderPresence);
  PCH.on("presence",{event:"leave"},renderPresence);
  PCH.subscribe(async status=>{ if(status==="SUBSCRIBED")await PCH.track({email:ME,page:CUR,at:Date.now()}); });
}
function presenceUpdate(){ if(PCH)PCH.track({email:ME,page:CUR,at:Date.now()}); }
function renderPresence(){
  if(!PCH)return;
  const st=PCH.presenceState(); const people=[];
  Object.values(st).forEach(arr=>arr.forEach(p=>people.push(p)));
  const seen={}; const uniq=people.filter(p=>seen[p.email]?false:(seen[p.email]=true));
  const av=p=>{const ini=(p.email||"?").slice(0,2).toUpperCase(); const me=p.email===ME;
    return `<div class="av ${me?'me':''}" title="${esc(p.email||'')}${PAGEL[p.page]?' · '+PAGEL[p.page]:''}" style="background:${colorFor(p.email||'')}">${ini}<span class="dot"></span></div>`;};
  const others=uniq.filter(p=>p.email!==ME);
  const who=others.length
    ? esc((others[0].email||"").split("@")[0])+(PAGEL[others[0].page]?` · ${PAGEL[others[0].page]}`:"")+(others.length>1?` +${others.length-1}`:"")
    : "Solo vos en línea";
  const el=$("presence"); if(el)el.innerHTML=uniq.map(av).join("")+`<div class="who">${who}</div>`;
  const m=$("presenceMini"); if(m)m.innerHTML=uniq.map(av).join("");
}

// ---- ARRANQUE ----
(async()=>{
  const {data:{session}}=await sb.auth.getSession();
  if(session){initApp(session);} else {$("loginWrap").classList.add("on");}
  const pw=$("lgPass"), em=$("lgEmail");
  if(pw)pw.addEventListener("keydown",e=>{if(e.key==="Enter")doLogin();});
  if(em)em.addEventListener("keydown",e=>{if(e.key==="Enter")pw.focus();});
})();
</script>
